# Decap CMS configuration
#
# BEFORE FIRST DEPLOY: replace YOUR_GITHUB_USERNAME/dynamic-fabric-site below,
# and set base_url to your OAuth proxy Worker URL (see README, step 4).
backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/dynamic-fabric-site
  branch: main
  base_url: https://YOUR-OAUTH-PROXY.workers.dev

# Uncomment to edit locally: run `npx decap-server` in one terminal,
# `npm run dev` in another, then open http://localhost:4321/admin/
# local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: blog
    label: Blog posts
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD" }
      - { name: description, label: Short description, widget: text, required: false }
      - { name: image, label: Cover image, widget: image, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: products
    label: Products
    folder: src/content/products
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Product name, widget: string }
      - { name: description, label: Short description, widget: text }
      - { name: image, label: Product image, widget: image, required: false }
      - { name: featured, label: Show on homepage, widget: boolean, default: false }
      - { name: order, label: Sort order, widget: number, default: 0 }
      - name: specs
        label: Specifications
        widget: list
        required: false
        fields:
          - { name: name, label: Spec name, widget: string }
          - { name: value, label: Spec value, widget: string }
      - { name: body, label: Details, widget: markdown }

  - name: pages
    label: Pages
    files:
      - name: home
        label: Homepage
        file: src/content/pages/home.md
        fields:
          - { name: title, label: Title, widget: hidden, default: Home }
          - { name: heroTitle, label: Hero headline, widget: string }
          - { name: heroSubtitle, label: Hero subheadline, widget: text }
          - { name: ctaLabel, label: Button label, widget: string, required: false }
          - { name: ctaLink, label: Button link, widget: string, required: false, default: /contact/ }
          - name: features
            label: Feature cards
            widget: list
            required: false
            fields:
              - { name: title, label: Title, widget: string }
              - { name: text, label: Text, widget: text }
          - name: stats
            label: Stats
            widget: list
            required: false
            fields:
              - { name: value, label: Value, widget: string }
              - { name: label, label: Label, widget: string }
          - { name: body, label: Main content, widget: markdown }
      - name: about
        label: About page
        file: src/content/pages/about.md
        fields:
          - { name: title, label: Page title, widget: string }
          - { name: intro, label: Intro line, widget: text, required: false }
          - { name: body, label: Content, widget: markdown }
      - name: contact
        label: Contact page
        file: src/content/pages/contact.md
        fields:
          - { name: title, label: Page title, widget: string }
          - { name: intro, label: Intro line, widget: text, required: false }
          - { name: email, label: Email, widget: string }
          - { name: phone, label: Phone, widget: string }
          - { name: address, label: Address, widget: text }
          - { name: body, label: Extra content, widget: markdown }

  - name: settings
    label: Site settings
    files:
      - name: site
        label: General settings
        file: src/data/settings.json
        fields:
          - { name: siteName, label: Site name, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: email, label: Email, widget: string }
          - { name: phone, label: Phone, widget: string }
          - { name: address, label: Address, widget: text }
          - { name: footerText, label: Footer text, widget: text }
